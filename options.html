<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Send to Archive — Options</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      background: #f5f5f5;
      color: #222;
      display: flex;
      justify-content: center;
      padding: 48px 16px;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      padding: 32px;
      max-width: 480px;
      width: 100%;
    }
    h1 {
      font-size: 1.25rem;
      margin-bottom: 20px;
    }
    label {
      display: block;
      font-size: 0.875rem;
      font-weight: 600;
      margin-bottom: 6px;
    }
    input[type="text"] {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.15s;
    }
    input[type="text"]:focus {
      border-color: #4a90d9;
    }
    input[type="text"]:focus-visible {
      outline: 2px solid #4a90d9;
      outline-offset: 2px;
    }
    .actions {
      margin-top: 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    button {
      padding: 10px 20px;
      border: none;
      border-radius: 6px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      background: #4a90d9;
      color: #fff;
      transition: background 0.15s;
    }
    button:hover { background: #3a7bc8; }
    .status {
      font-size: 0.85rem;
      color: #2e7d32;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .status.visible { opacity: 1; }
    .toggle-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 18px;
    }
    .toggle-row input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #4a90d9;
      cursor: pointer;
    }
    .toggle-row label {
      margin-bottom: 0;
      font-weight: 500;
      cursor: pointer;
    }
    .shortcuts-link {
      display: inline-block;
      margin-top: 20px;
      font-size: 0.85rem;
      color: #4a90d9;
      text-decoration: none;
    }
    .shortcuts-link:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Send to Archive — Options</h1>
    <label for="prefix">URL prefix</label>
    <input type="text" id="prefix" placeholder="https://archive.is/">
    <div class="toggle-row">
      <input type="checkbox" id="newTab">
      <label for="newTab">Open in new tab</label>
    </div>
    <div class="actions">
      <button id="save">Save</button>
      <span class="status" id="status">Saved!</span>
    </div>
    <a class="shortcuts-link" id="shortcuts-link" href="#">Configure keyboard shortcut</a>
  </div>
  <script src="shared.js"></script>
  <script src="options.js"></script>
</body>
</html>
